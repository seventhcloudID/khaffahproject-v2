services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    command: npm run dev
    restart: unless-stopped
    container_name: khaffah_frontend_dev
    ports:
      - "3000:3000"
    networks:
      - khaffah_frontend_network_dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: khaffah_frontend_cloudflared_dev
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - khaffah_frontend_network_dev
    volumes:
      - ./cloudflared:/etc/cloudflared
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://app:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  khaffah_frontend_network_dev:
    driver: bridge
