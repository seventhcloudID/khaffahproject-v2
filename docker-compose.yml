services: # Cloudflare Tunnel (Optional - Alternative to Traefik)
  
  app:
    build: 
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    container_name: khaffah_frontend
    networks:
      - khaffah_frontend_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: khaffah_frontend_cloudflared
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - khaffah_frontend_network
    volumes:
      - ./cloudflared:/etc/cloudflared
    # profiles:
      # - cloudflare
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://app:3000/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  khaffah_frontend_network:
    driver: bridge